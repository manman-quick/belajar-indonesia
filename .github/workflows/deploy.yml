name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Expo Web (static export)
        run: pnpm exec expo export --platform web
        env:
          NODE_ENV: production

      - name: Copy PWA assets to dist
        run: |
          cp public/sw.js dist/
          cp public/manifest.json dist/
          cp public/icon-192.png dist/
          cp public/icon-512.png dist/
          cp public/favicon.ico dist/
          cp public/register-sw.js dist/

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          # GitHub Pages serves from /belajar-indonesia/ subdirectory
          # Update manifest.json start_url and icon paths
          sed -i 's|"start_url": "/"|"start_url": "/belajar-indonesia/"|g' dist/manifest.json
          sed -i 's|"src": "/favicon.ico"|"src": "/belajar-indonesia/favicon.ico"|g' dist/manifest.json
          sed -i 's|"src": "/icon-192.png"|"src": "/belajar-indonesia/icon-192.png"|g' dist/manifest.json
          sed -i 's|"src": "/icon-512.png"|"src": "/belajar-indonesia/icon-512.png"|g' dist/manifest.json

      - name: Add .nojekyll to disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
