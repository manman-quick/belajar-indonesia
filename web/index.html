<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />

    <title>Belajar Indonesia - 印尼语学习</title>
    <meta name="description" content="专为中文母语者设计的印尼语学习应用，从基础发音到进阶语法，系统化掌握印度尼西亚语。" />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Belajar Indonesia" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Belajar ID" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="msapplication-TileColor" content="#FF6B35" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Belajar Indonesia - 印尼语学习" />
    <meta property="og:description" content="专为中文母语者设计的印尼语学习应用，从基础发音到进阶语法，系统化掌握印度尼西亚语。" />
    <meta property="og:image" content="/belajar-indonesia/icon-512.png" />

    <!-- PWA Manifest - use subdirectory path for GitHub Pages -->
    <link rel="manifest" href="/belajar-indonesia/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/belajar-indonesia/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/belajar-indonesia/icon-512.png" />
    <link rel="shortcut icon" href="/belajar-indonesia/favicon.ico" />
    <link rel="apple-touch-icon" href="/belajar-indonesia/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/belajar-indonesia/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/belajar-indonesia/icon-512.png" />

    <style id="expo-reset">
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* PWA install banner */
      #pwa-install-banner {
        display: none;
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: #FF6B35;
        color: white;
        padding: 12px 20px;
        border-radius: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        z-index: 9999;
        box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
        white-space: nowrap;
        align-items: center;
        gap: 8px;
      }
      #pwa-install-banner.show {
        display: flex;
      }
    </style>
  </head>

  <body>
    <noscript>请启用 JavaScript 以运行此应用。</noscript>
    <div id="root"></div>

    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" onclick="installPWA()">
      📲 安装到桌面
      <span onclick="dismissBanner(event)" style="margin-left:8px;opacity:0.7;font-size:16px;">✕</span>
    </div>

    <!-- Service Worker Registration - use subdirectory path -->
    <script src="/belajar-indonesia/register-sw.js"></script>

    <script>
      // Show install banner when PWA prompt is ready
      window.addEventListener('pwaInstallReady', function(e) {
        var banner = document.getElementById('pwa-install-banner');
        if (banner) {
          banner.classList.add('show');
          banner._prompt = e.detail.prompt;
        }
      });

      function installPWA() {
        var banner = document.getElementById('pwa-install-banner');
        if (banner && banner._prompt) {
          banner._prompt.prompt();
          banner._prompt.userChoice.then(function(result) {
            if (result.outcome === 'accepted') {
              banner.classList.remove('show');
            }
          });
        }
      }

      function dismissBanner(e) {
        e.stopPropagation();
        var banner = document.getElementById('pwa-install-banner');
        if (banner) banner.classList.remove('show');
      }
    </script>
  </body>
</html>
