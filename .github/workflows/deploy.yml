name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.0'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear NativeWind CSS cache (prevents SHA-1 error)
        run: |
          mkdir -p node_modules/react-native-css-interop/.cache
          touch node_modules/react-native-css-interop/.cache/web.css

      - name: Build Expo Web (static export)
        run: pnpm exec expo export --platform web --output-dir dist
        env:
          NODE_ENV: production
          EXPO_USE_METRO_WORKSPACE_ROOT: 1

      - name: Copy PWA assets to dist
        run: |
          cp public/sw.js dist/
          cp public/manifest.json dist/
          cp public/icon-192.png dist/
          cp public/icon-512.png dist/
          cp public/favicon.ico dist/
          cp public/register-sw.js dist/

      - name: Inject PWA tags into all HTML files
        run: |
          python3 << 'PYEOF'
          import os, re
          dist = 'dist'
          pwa_head = '<meta name="application-name" content="Belajar Indonesia"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="default"/><meta name="apple-mobile-web-app-title" content="Belajar ID"/><meta name="mobile-web-app-capable" content="yes"/><meta name="theme-color" content="#FF6B35"/><link rel="manifest" href="/belajar-indonesia/manifest.json"/><link rel="apple-touch-icon" href="/belajar-indonesia/icon-192.png"/>'
          pwa_sw = '<script src="/belajar-indonesia/register-sw.js"></script>'
          for root, dirs, files in os.walk(dist):
            for fname in files:
              if fname.endswith('.html'):
                path = os.path.join(root, fname)
                with open(path) as f: content = f.read()
                if 'manifest' not in content:
                  content = content.replace('<meta charSet="utf-8"/>', '<meta charSet="utf-8"/>' + pwa_head)
                  content = content.replace('</body>', pwa_sw + '</body>')
                  with open(path, 'w') as f: f.write(content)
          print('PWA tags injected into all HTML files')
          PYEOF

      - name: Fix SPA routing for GitHub Pages (404 redirect)
        run: |
          python3 << 'PYEOF'
          import os, re

          dist = 'dist'
          base = '/belajar-indonesia'

          # Read index.html
          index_path = os.path.join(dist, 'index.html')
          with open(index_path) as f:
              index_content = f.read()

          # Fix all internal href/src paths in index.html to include base path
          # Expo Router generates hrefs like href="/review" - we need href="/belajar-indonesia/review"
          def fix_paths(content):
              # Fix href="/xxx" patterns (but not href="//" or href="https://")
              content = re.sub(
                  r'href="(/(?!/)(?!belajar-indonesia)(?!http)([^"]*))"',
                  lambda m: f'href="{base}{m.group(1)}"',
                  content
              )
              # Fix src="/xxx" patterns for scripts/assets
              content = re.sub(
                  r'src="(/(?!/)(?!belajar-indonesia)(?!http)([^"]*))"',
                  lambda m: f'src="{base}{m.group(1)}"',
                  content
              )
              return content

          fixed_index = fix_paths(index_content)
          with open(index_path, 'w') as f:
              f.write(fixed_index)

          # Also fix all other HTML files generated by Expo (review.html, stats.html etc.)
          for root, dirs, files in os.walk(dist):
              for fname in files:
                  if fname.endswith('.html') and fname != 'index.html':
                      path = os.path.join(root, fname)
                      with open(path) as f: content = f.read()
                      fixed = fix_paths(content)
                      with open(path, 'w') as f: f.write(fixed)

          # Create 404.html that redirects back to index with path encoded as query param
          redirect_script = """
          <script>
            var l = window.location;
            var base = '/belajar-indonesia';
            var path = l.pathname.replace(base, '') || '/';
            if (path && path !== '/') {
              l.replace(base + '/?p=' + encodeURIComponent(path + l.search) + (l.hash || ''));
            }
          </script>
          """
          with open(index_path) as f: idx = f.read()
          content_404 = idx.replace('</head>', redirect_script + '</head>')
          with open(os.path.join(dist, '404.html'), 'w') as f:
              f.write(content_404)

          # Inject path-restore script into index.html
          restore_script = """
          <script>
            (function() {
              var p = window.location.search.match(/[?&]p=([^&]+)/);
              if (p) {
                var path = decodeURIComponent(p[1]);
                window.history.replaceState(null, null, '/belajar-indonesia' + path);
              }
            })();
          </script>
          """
          with open(index_path) as f: idx = f.read()
          new_index = idx.replace('<head>', '<head>' + restore_script)
          with open(index_path, 'w') as f:
              f.write(new_index)

          print('SPA routing fix applied: paths fixed, 404.html created')
          PYEOF

      - name: Add .nojekyll to disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
