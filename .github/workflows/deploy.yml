name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.0'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear NativeWind CSS cache (prevents SHA-1 error)
        run: |
          mkdir -p node_modules/react-native-css-interop/.cache
          touch node_modules/react-native-css-interop/.cache/web.css

      - name: Build Expo Web (static export)
        run: pnpm exec expo export --platform web --output-dir dist
        env:
          NODE_ENV: production
          EXPO_USE_METRO_WORKSPACE_ROOT: 1

      - name: Copy PWA assets to dist
        run: |
          cp public/sw.js dist/
          cp public/manifest.json dist/
          cp public/icon-192.png dist/
          cp public/icon-512.png dist/
          cp public/favicon.ico dist/
          cp public/register-sw.js dist/

      - name: Inject PWA tags into all HTML files
        run: |
          python3 << 'PYEOF'
          import os, re
          dist = 'dist'
          pwa_head = '<meta name="application-name" content="Belajar Indonesia"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="default"/><meta name="apple-mobile-web-app-title" content="Belajar ID"/><meta name="mobile-web-app-capable" content="yes"/><meta name="theme-color" content="#FF6B35"/><link rel="manifest" href="/belajar-indonesia/manifest.json"/><link rel="apple-touch-icon" href="/belajar-indonesia/icon-192.png"/>'
          pwa_sw = '<script src="/belajar-indonesia/register-sw.js"></script>'
          for root, dirs, files in os.walk(dist):
            for fname in files:
              if fname.endswith('.html'):
                path = os.path.join(root, fname)
                with open(path) as f: content = f.read()
                if 'manifest' not in content:
                  content = content.replace('<meta charSet="utf-8"/>', '<meta charSet="utf-8"/>' + pwa_head)
                  content = content.replace('</body>', pwa_sw + '</body>')
                  with open(path, 'w') as f: f.write(content)
          print('PWA tags injected into all HTML files')
          PYEOF

      - name: Restructure dist for GitHub Pages subdirectory deployment
        run: |
          # Move all Expo output into a belajar-indonesia/ subdirectory
          # so that GitHub Pages serves /belajar-indonesia/review.html etc.
          mkdir -p dist_final/belajar-indonesia
          cp -r dist/. dist_final/belajar-indonesia/

          # Create 404.html at root level for GitHub Pages SPA fallback
          cp dist_final/belajar-indonesia/index.html dist_final/404.html

          # Create root index.html that redirects to /belajar-indonesia/
          cat > dist_final/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=/belajar-indonesia/">
          <title>Redirecting...</title>
          </head><body>
          <script>window.location.replace('/belajar-indonesia/');</script>
          </body></html>
          EOF

          # Add .nojekyll to root
          touch dist_final/.nojekyll

          # Replace dist with dist_final
          rm -rf dist
          mv dist_final dist
          echo 'Restructured dist for GitHub Pages subdirectory deployment'

      - name: Add .nojekyll to disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
